<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Job Matcher</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #eef3f1;
        --text: #18211f;
        --muted: #60706a;
        --line: #d8e0dc;
        --accent: #1f7a5b;
        --accent-strong: #125f47;
        --danger: #a43333;
        --warning: #9a6500;
        --shadow: 0 12px 30px rgba(23, 36, 31, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand strong {
        font-size: 18px;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
      }

      .status-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
        padding: 7px 11px;
        background: var(--panel);
      }

      main {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 28px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
        gap: 20px;
        align-items: start;
      }

      .inputs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .editor {
        min-width: 0;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
      }

      h2 {
        font-size: 14px;
      }

      .panel-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .file-control {
        position: relative;
        overflow: hidden;
      }

      .file-control input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .btn {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        padding: 8px 11px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }

      .btn:hover {
        border-color: #aebbb6;
        background: #f8faf9;
      }

      .btn-primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
      }

      .btn-primary:hover {
        border-color: var(--accent-strong);
        background: var(--accent-strong);
      }

      .btn:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      textarea {
        display: block;
        width: 100%;
        min-height: 440px;
        resize: vertical;
        border: 0;
        outline: 0;
        padding: 16px;
        color: #17211e;
        background: #fbfcfc;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        line-height: 1.55;
      }

      .submit-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 16px;
        padding: 14px 16px;
      }

      .message {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error {
        color: var(--danger);
      }

      .message.warning {
        color: var(--warning);
      }

      .file-name {
        flex-basis: 100%;
        color: var(--muted);
        font-size: 12px;
      }

      .result {
        position: sticky;
        top: 20px;
        min-height: 560px;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 440px;
        padding: 30px;
        color: var(--muted);
        text-align: center;
      }

      .score-block {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 16px;
        align-items: center;
        padding: 18px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
      }

      .score {
        width: 88px;
        height: 88px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #ffffff;
        border: 7px solid var(--accent);
        font-size: 24px;
        font-weight: 800;
      }

      .recommendation {
        color: var(--accent-strong);
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .summary {
        margin-top: 6px;
        color: #33413d;
        line-height: 1.5;
      }

      .result-grid {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .result-section h3 {
        margin: 0 0 8px;
        font-size: 13px;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 9px;
        background: #ffffff;
        color: #293632;
        font-size: 12px;
      }

      ul {
        margin: 0;
        padding-left: 18px;
        color: #33413d;
        line-height: 1.5;
      }

      details {
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      summary {
        cursor: pointer;
        color: var(--accent-strong);
        font-size: 13px;
        font-weight: 700;
      }

      pre {
        overflow: auto;
        margin: 10px 0 0;
        max-height: 280px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfc;
        padding: 12px;
        color: #17211e;
        font-size: 12px;
        line-height: 1.45;
      }

      @media (max-width: 980px) {
        .workspace,
        .inputs {
          grid-template-columns: 1fr;
        }

        .result {
          position: static;
        }
      }

      @media (max-width: 640px) {
        .topbar,
        main {
          padding: 16px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .panel-header,
        .submit-row {
          align-items: flex-start;
          flex-direction: column;
        }

        textarea {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <strong>LLM Job Matcher</strong>
          <span>Dopasowanie CV PDF/DOCX/JSON do oferty pracy</span>
        </div>
        <span class="status-pill" id="apiStatus">API: sprawdzanie</span>
      </header>

      <main>
        <section class="workspace">
          <div>
            <div class="inputs">
              <article class="panel editor">
                <div class="panel-header">
                  <div class="panel-title">
                    <h1>CV</h1>
                    <span>Wklej JSON albo wgraj PDF, DOCX, TXT lub JSON</span>
                  </div>
                  <div class="actions">
                    <label class="btn file-control">
                      Wgraj
                      <input
                        id="cvFile"
                        type="file"
                        accept="application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,application/json,.pdf,.docx,.txt,.json"
                      />
                    </label>
                    <button class="btn" id="cvSample" type="button">Przykład</button>
                    <span class="file-name" id="cvFileName">Tryb: CV jako JSON</span>
                  </div>
                </div>
                <textarea id="cvInput" spellcheck="false" aria-label="CV JSON"></textarea>
              </article>

              <article class="panel editor">
                <div class="panel-header">
                  <div class="panel-title">
                    <h1>Job offer</h1>
                    <span>Wklej JSON albo wgraj plik .json</span>
                  </div>
                  <div class="actions">
                    <label class="btn file-control">
                      Wgraj
                      <input id="jobFile" type="file" accept="application/json,.json" />
                    </label>
                    <button class="btn" id="jobSample" type="button">Przykład</button>
                  </div>
                </div>
                <textarea id="jobInput" spellcheck="false" aria-label="Job offer JSON"></textarea>
              </article>
            </div>

            <div class="panel submit-row">
              <p class="message" id="message">Gotowe</p>
              <button class="btn btn-primary" id="matchButton" type="button">
                Dopasuj CV
              </button>
            </div>
          </div>

          <aside class="panel result">
            <div class="panel-header">
              <div class="panel-title">
                <h2>Wynik</h2>
                <span>Ocena LLM</span>
              </div>
            </div>
            <div id="result">
              <div class="empty-state">Brak wyniku.</div>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script>
      const cvInput = document.querySelector("#cvInput");
      const jobInput = document.querySelector("#jobInput");
      const matchButton = document.querySelector("#matchButton");
      const message = document.querySelector("#message");
      const result = document.querySelector("#result");
      const apiStatus = document.querySelector("#apiStatus");
      const cvFileName = document.querySelector("#cvFileName");
      let selectedCvDocument = null;

      const samples = {
        cv: {
          name: "Anna Kowalska",
          skills: ["Python", "FastAPI", "SQL"],
          experience: [
            {
              role: "Backend Developer",
              years: 2,
              description: "Built REST APIs in Python and FastAPI."
            }
          ],
          languages: ["English B2", "Polish native"]
        },
        job: {
          title: "Junior Python Developer",
          required_skills: ["Python", "FastAPI", "PostgreSQL"],
          nice_to_have: ["Docker", "AWS"],
          description: "Build and maintain APIs for internal business tools."
        }
      };

      function prettyJson(value) {
        return JSON.stringify(value, null, 2);
      }

      function setMessage(text, type = "") {
        message.textContent = text;
        message.className = `message ${type}`.trim();
      }

      function parseInput(text, label) {
        try {
          return JSON.parse(text);
        } catch (error) {
          throw new Error(`${label} nie jest poprawnym JSON-em.`);
        }
      }

      function renderList(items) {
        if (!items || items.length === 0) {
          return "<p class=\"message\">Brak</p>";
        }

        return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
      }

      function renderChips(items) {
        if (!items || items.length === 0) {
          return "<p class=\"message\">Brak</p>";
        }

        return `<div class="chips">${items
          .map((item) => `<span class="chip">${escapeHtml(item)}</span>`)
          .join("")}</div>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderResult(data, parsedCv = null) {
        result.innerHTML = `
          <div class="score-block">
            <div class="score">${Math.round(data.match_score)}</div>
            <div>
              <div class="recommendation">${escapeHtml(data.recommendation)}</div>
              <p class="summary">${escapeHtml(data.summary)}</p>
            </div>
          </div>
          <div class="result-grid">
            <section class="result-section">
              <h3>Dopasowane umiejętności</h3>
              ${renderChips(data.matched_skills)}
            </section>
            <section class="result-section">
              <h3>Brakujące umiejętności</h3>
              ${renderChips(data.missing_skills)}
            </section>
            <section class="result-section">
              <h3>Mocne strony</h3>
              ${renderList(data.strengths)}
            </section>
            <section class="result-section">
              <h3>Luki</h3>
              ${renderList(data.gaps)}
            </section>
            ${
              parsedCv
                ? `<details>
                    <summary>Parsed CV JSON</summary>
                    <pre>${escapeHtml(prettyJson(parsedCv))}</pre>
                  </details>`
                : ""
            }
          </div>
        `;
      }

      async function readJobJsonFile(file, target) {
        if (!file) {
          return;
        }

        target.value = await file.text();
        setMessage(`Wczytano ${file.name}`);
      }

      async function handleCvFile(file) {
        if (!file) {
          return;
        }

        const extension = file.name.split(".").pop().toLowerCase();

        if (extension === "json") {
          selectedCvDocument = null;
          cvInput.value = await file.text();
          cvFileName.textContent = `Tryb: CV JSON z pliku ${file.name}`;
          setMessage(`Wczytano ${file.name}`);
          return;
        }

        selectedCvDocument = file;
        cvInput.value = "";
        cvInput.placeholder = "Wybrano dokument CV. Backend wyciągnie tekst i zamieni go na JSON.";
        cvFileName.textContent = `Tryb: dokument CV ${file.name}`;
        setMessage(`Wybrano ${file.name}`);
      }

      async function checkApi() {
        try {
          const response = await fetch("/health");
          apiStatus.textContent = response.ok ? "API: ok" : "API: błąd";
        } catch (error) {
          apiStatus.textContent = "API: offline";
        }
      }

      async function matchCv() {
        setMessage("Dopasowywanie...");
        matchButton.disabled = true;

        try {
          const jobOffer = parseInput(jobInput.value, "Oferta pracy");
          let response;

          if (selectedCvDocument) {
            const formData = new FormData();
            formData.append("cv_file", selectedCvDocument);
            formData.append("job_offer", JSON.stringify(jobOffer));

            response = await fetch("/match/upload", {
              method: "POST",
              body: formData
            });
          } else {
            const payload = {
              cv: parseInput(cvInput.value, "CV"),
              job_offer: jobOffer
            };

            response = await fetch("/match", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
          }

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || "Dopasowanie nie powiodło się.");
          }

          if (data.match) {
            renderResult(data.match, data.parsed_cv);
          } else {
            renderResult(data);
          }
          setMessage("Gotowe");
        } catch (error) {
          setMessage(error.message, "error");
        } finally {
          matchButton.disabled = false;
        }
      }

      document.querySelector("#cvSample").addEventListener("click", () => {
        selectedCvDocument = null;
        cvFileName.textContent = "Tryb: CV jako JSON";
        cvInput.placeholder = "";
        cvInput.value = prettyJson(samples.cv);
      });

      document.querySelector("#jobSample").addEventListener("click", () => {
        jobInput.value = prettyJson(samples.job);
      });

      document.querySelector("#cvFile").addEventListener("change", (event) => {
        handleCvFile(event.target.files[0]);
      });

      document.querySelector("#jobFile").addEventListener("change", (event) => {
        readJobJsonFile(event.target.files[0], jobInput);
      });

      matchButton.addEventListener("click", matchCv);

      cvInput.value = prettyJson(samples.cv);
      jobInput.value = prettyJson(samples.job);
      checkApi();
    </script>
  </body>
</html>
